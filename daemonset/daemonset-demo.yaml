apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: default
  labels:
    app: log-collector
spec:
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane  # ให้รันบน master ด้วย
        effect: NoSchedule
        operator: Exists
      containers:
      - name: log-collector
        image: busybox:1.28
        command: ["sh", "-c", "while true; do echo \"[$(date)] collecting logs from $(hostname)\"; sleep 5; done"]
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
