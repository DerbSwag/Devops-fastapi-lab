server {
    listen 80;
    server_name 192.168.141.129;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 192.168.141.129;

    ssl_certificate /etc/nginx/self.crt;
    ssl_certificate_key /etc/nginx/self.key;

    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
