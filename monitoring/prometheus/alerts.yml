groups:

- name: node_alerts
  rules:

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "High CPU Usage"
      description: "CPU usage above 80% on {{ $labels.instance }}"
